<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CWAGS Optimized</title>
  <link rel="stylesheet" href="cwags_styles.css" />
</head>
<body>
  <div class="table-container">
    <h3 style="padding: 1rem; margin: 0; background: #f7fafc; color: #4a5568;">
      Dog Records
      <span id="recordCount" style="font-weight: normal; font-size: 0.9rem; color: #718096;"></span>
    </h3>

    <div style="padding: 1rem;">
      <label for="pageSize">Records per page:</label>
      <select id="pageSize" onchange="renderDogTable()">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
      </select>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>Registration #</th>
          <th>Call Name</th>
          <th>Full Name</th>
          <th>Handler</th>
          <th>Class</th>
          <th>Judge</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="dogRecordsTable"></tbody>
    </table>

    <div style="text-align: center; padding: 1rem;">
      <button onclick="changePage(-1)">Previous</button>
      <span id="pageIndicator"></span>
      <button onclick="changePage(1)">Next</button>
    </div>
  </div>

  <script>
    // Mock data - replace with fetch if needed
    const dogData = Array.from({ length: 100 }, (_, i) => ({
      id: `07-00${i + 1}`,
      callName: `Dog${i + 1}`,
      fullName: `Full Dog Name ${i + 1}`,
      handlerFirstName: "Jane",
      handlerLastName: `Doe${i + 1}`,
      handlerFullName: `Jane Doe${i + 1}`,
      className: i % 2 === 0 ? "Obedience Level 1" : "Rally Level 2",
      judgeName: i % 2 === 0 ? "Judge A" : "Judge B"
    }));
  </script>
  <script src="cwags_main_script.js"></script>
  <script>
    renderDogTable();
  </script>
</body>
</html>
