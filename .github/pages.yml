# .github/workflows/pages.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

---
# .gitignore
# Node modules (for GitHub Actions)
node_modules/
package*.json

# OS generated files
.DS_Store
.DS_Store?
._*
.Spotlight-V100
.Trashes
ehthumbs.db
Thumbs.db

# Editor files
.vscode/
.idea/
*.swp
*.swo
*~

# Backup files
*.bak
*.backup
*.tmp

---
# _config.yml (Jekyll configuration for GitHub Pages)
title: "C-WAGS Trial Management System"
description: "Comprehensive trial management for Canine-Work And Games organization"
baseurl: ""
url: "https://yourusername.github.io"

# GitHub Pages settings
github_username: yourusername
repository: your-repository-name

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

# Exclude files from build
exclude:
  - README.md
  - .gitignore
  - .github/
  - node_modules/
  - package*.json

# Include data files
include:
  - data/

# Plugin settings
plugins:
  - jekyll-feed
  - jekyll-sitemap